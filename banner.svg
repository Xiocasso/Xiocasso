<svg width="860" height="280" viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&amp;family=IBM+Plex+Sans:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="280" fill="#0a0a0a" rx="8"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="860" y2="60" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="180" x2="860" y2="180" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="280" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="860" height="2" fill="#c8ff00" rx="0"/>

  <!-- Live dot -->
  <circle cx="36" cy="36" r="5" fill="#00ffc8"/>
  <text x="48" y="40" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#00ffc8" letter-spacing="0.08em">LIVE · api.identity-os.dev</text>

