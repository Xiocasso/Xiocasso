  <text x="430" y="262" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="300" fill="#3a3a35" text-anchor="middle" letter-spacing="0.04em">building the guardrails so agents can be themselves — safely.</text>

  <!-- Corner tag -->
  <rect x="780" y="16" width="64" height="20" rx="2" fill="#1a1a1a" stroke="#c8ff00" stroke-opacity="0.3" stroke-width="1"/>
  <text x="812" y="30" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#c8ff00" text-anchor="middle" letter-spacing="0.05em">v0.9.0-β</text>
