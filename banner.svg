  <!-- Stat 1 -->
  <text x="145" y="205" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="#e8e8e0" text-anchor="middle">2,000+</text>
  <text x="145" y="222" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#555550" text-anchor="middle" letter-spacing="0.06em">ADVERSARIAL TURNS</text>

  <!-- Divider -->
  <line x1="262" y1="192" x2="262" y2="230" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Stat 2 -->
  <text x="330" y="205" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="#e8e8e0" text-anchor="middle">44/44</text>
  <text x="330" y="222" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#555550" text-anchor="middle" letter-spacing="0.06em">PRODUCTION TESTS</text>

  <!-- Divider -->
  <line x1="400" y1="192" x2="400" y2="230" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Stat 3 -->
  <text x="470" y="205" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="#e8e8e0" text-anchor="middle">433+</text>
  <text x="470" y="222" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#555550" text-anchor="middle" letter-spacing="0.06em">AUTOMATED TESTS</text>

  <!-- Divider -->
  <line x1="538" y1="192" x2="538" y2="230" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Stat 4 -->
  <text x="608" y="205" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="#e8e8e0" text-anchor="middle">3</text>
  <text x="608" y="222" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#555550" text-anchor="middle" letter-spacing="0.06em">FRAMEWORKS</text>

  <!-- Divider -->
  <line x1="676" y1="192" x2="676" y2="230" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Stat 5 -->
  <text x="760" y="205" font-family="'IBM Plex Mono', monospace" font-size="20" font-weight="600" fill="#c8ff00" text-anchor="middle">0</text>
  <text x="760" y="222" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#555550" text-anchor="middle" letter-spacing="0.06em">FORBIDDEN ACTIONS</text>

