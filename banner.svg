  <text x="430" y="148" font-family="'IBM Plex Sans', sans-serif" font-size="15" font-weight="300" fill="#888880" text-anchor="middle" letter-spacing="0.01em">behavioral middleware for AI agents</text>

  <!-- Divider line -->
  <line x1="330" y1="165" x2="530" y2="165" stroke="#c8ff00" stroke-opacity="0.25" stroke-width="1"/>

