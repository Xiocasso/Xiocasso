<svg width="860" height="320" viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="320" fill="#0a0a0a" rx="6"/>

  <!-- Section label -->
  <line x1="32" y1="48" x2="48" y2="48" stroke="#555550" stroke-width="1"/>
  <text x="56" y="52" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#555550" letter-spacing="0.12em">WHAT IT DOES</text>

  <!-- Description text -->
  <text x="32" y="90" font-family="'IBM Plex Sans', sans-serif" font-size="14" font-weight="300" fill="#a0a098">Your agent sends a behavioral observation. Identity OS returns a</text>
  <text x="32" y="112" font-family="'IBM Plex Sans', sans-serif" font-size="14" font-weight="300" fill="#a0a098">read-only <tspan font-weight="500" fill="#e8e8e0">ExecutionContract</tspan> — allowed actions, forbidden actions,</text>
  <text x="32" y="134" font-family="'IBM Plex Sans', sans-serif" font-size="14" font-weight="300" fill="#a0a098">decision style, energy level, stress state, and drift flag.</text>
  <text x="32" y="156" font-family="'IBM Plex Sans', sans-serif" font-size="14" font-weight="300" fill="#a0a098"><tspan font-weight="500" fill="#e8e8e0">Deterministic. Auditable. Framework-agnostic.</tspan></text>

  <!-- Divider -->
  <line x1="32" y1="178" x2="828" y2="178" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Callout block -->
  <rect x="32" y="196" width="3" height="60" fill="#c8ff00" rx="1"/>
  <text x="48" y="220" font-family="'IBM Plex Sans', sans-serif" font-size="14" font-style="italic" fill="#888880">Not by telling the model</text>
  <text x="48" y="242" font-family="'IBM Plex Sans', sans-serif" font-size="14" font-style="italic" fill="#c8c8c0">"don't do this."</text>
  <text x="176" y="242" font-family="'IBM Plex Sans', sans-serif" font-size="14" font-style="italic" fill="#888880"> By removing the option entirely.</text>

  <!-- Bottom: framework tags -->
  <text x="32" y="295" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#444440">Works with</text>

  <rect x="108" y="279" width="82" height="22" rx="3" fill="#111" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="149" y="294" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#888880" text-anchor="middle">LangGraph</text>

  <rect x="200" y="279" width="68" height="22" rx="3" fill="#111" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="234" y="294" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#888880" text-anchor="middle">CrewAI</text>

  <rect x="278" y="279" width="148" height="22" rx="3" fill="#111" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="352" y="294" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#888880" text-anchor="middle">OpenAI Agents SDK</text>
</svg>
